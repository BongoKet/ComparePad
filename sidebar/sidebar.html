<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComparePad</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>ComparePad</span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ── Add Product Actions ── -->
  <div class="actions-bar">
    <button id="add-tab-btn" class="action-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add This Tab
    </button>
    <button id="add-window-btn" class="action-btn action-btn--secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      Add All Tabs
    </button>
  </div>

  <!-- ── Product Cards ── -->
  <div id="products-list"></div>

  <!-- ── Empty State ── -->
  <div id="empty-state">
    <div class="empty-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>
    <p class="empty-title">No products yet</p>
    <p class="empty-sub">Open a product page and click <strong>Add This Tab</strong></p>
  </div>

  <!-- ── Compare Button ── -->
  <div id="compare-section" class="hidden">
    <button id="compare-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Compare with AI
    </button>
  </div>

  <!-- ── Loading ── -->
  <div id="loading" class="hidden">
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <span class="loader-text">Analyzing products...</span>
  </div>

  <!-- ── Results ── -->
  <div id="results-container" class="hidden">
    <div class="results-header">
      <span>Comparison</span>
      <button id="results-clear" class="icon-btn" title="Clear results">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="results-body"></div>
  </div>

  <!-- ── Chat ── -->
  <div id="chat-section" class="hidden">
    <div class="chat-divider">
      <span>Follow-up Chat</span>
    </div>
    <div id="chat-messages"></div>
  </div>

  <!-- ── Chat Input (sticky bottom) ── -->
  <div id="chat-input-bar" class="hidden">
    <input type="text" id="chat-input" placeholder="Ask a follow-up question..." autocomplete="off">
    <button id="chat-send" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

  <!-- ── Settings Modal ── -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close" class="icon-btn" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">Gemini API Key</span>
          <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" spellcheck="false">
        </label>
        <p class="field-hint">Leave blank to use our default server (usage limits apply), or enter your own <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Gemini API key</a> for unlimited free queries.</p>
      </div>
      <div class="modal-footer">
        <button id="save-key-btn" class="btn-primary">Save Key</button>
        <div id="key-status" class="hidden"></div>
      </div>
    </div>
  </div>

  <!-- ── Error Toast ── -->
  <div id="toast" class="hidden"></div>

  <script src="marked.min.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
